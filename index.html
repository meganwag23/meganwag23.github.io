<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Megan | Director of Operations</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f5f0eb 0%, #ede8f0 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    }

    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a96e, #a78bca);
      z-index: -1;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      color: #1e1b2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #a78bca;
      font-weight: 500;
      margin-bottom: 28px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #c9a96e, #a78bca);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .about {
      font-size: 1rem;
      line-height: 1.85;
      color: #4a4560;
      margin-bottom: 36px;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e1b2e;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
    }

    .github-link:hover {
      background: #a78bca;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <img class="avatar" src="https://github.com/meganwag23.png" alt="Megan" />
    </div>
    <h1>Megan</h1>
    <p class="subtitle">Director of Operations</p>
    <div class="divider"></div>
    <p class="about">
      I'm a Director of Operations with a passion for building efficient systems
      and leading high-performing teams. I'm always looking for new ways to bring
      clarity and momentum to complex challenges.
    </p>

      github.com/meganwag23
    </a>
  </div>
</body>
</html>
