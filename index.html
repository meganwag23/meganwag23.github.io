<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Megan | Director of Operations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background-color: #fafaf8; color: #2c2c2c; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 20px; }
    .card { max-width: 560px; width: 100%; text-align: center; }
    .avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #d4c9b8; margin-bottom: 24px; }
    h1 { font-size: 2rem; font-weight: normal; letter-spacing: 0.04em; margin-bottom: 6px; color: #1a1a1a; }
    .subtitle { font-family: 'Helvetica Neue', sans-serif; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 32px; }
    .divider { width: 40px; height: 1px; background-color: #d4c9b8; margin: 0 auto 32px; }
    .about { font-size: 1rem; line-height: 1.8; color: #444; margin-bottom: 40px; }
    .github-link { font-family: 'Helvetica Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; text-decoration: none; border-bottom: 1px solid #d4c9b8; padding-bottom: 2px; }
    .github-link:hover { color: #2c2c2c; }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://github.com/meganwag23.png" alt="Megan's profile photo" />
    <h1>Megan</h1>
    <p class="subtitle">Director of Operations</p>
    <div class="divider"></div>
    <p class="about">I'm a Director of Operations with a passion for building efficient systems and leading high-performing teams. I'm always looking for new ways to bring clarity and momentum to complex challenges.</p>
    <a class="github-link" href="https://github.com/meganwag23" target="_blank">github.com/meganwag23</a>
  </div>
</body>
</html>
